<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Три года вместе ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Montserrat,sans-serif}
body{
min-height:100vh;
background:linear-gradient(135deg,#fff0f5,#ffe4ec);
color:#333;
overflow-x:hidden;
}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{
width:min(700px,100%);
background:rgba(255,255,255,.75);
backdrop-filter:blur(14px);
border-radius:28px;
padding:32px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
text-align:center;
animation:fade .5s ease;
}
h1{font-size:3rem;margin-bottom:12px}
h2{margin-bottom:16px}
p{line-height:1.8}
.btn{
margin-top:24px;border:none;border-radius:16px;
padding:14px 24px;font-size:1rem;cursor:pointer;
background:#ff5c8a;color:white;
}
.progress{
height:10px;background:#eee;border-radius:99px;margin-bottom:18px;overflow:hidden
}
.progress div{height:100%;background:#ff5c8a;width:0%}
input,textarea{
width:100%;padding:14px;border-radius:14px;border:1px solid #ddd;
margin-top:14px;font-size:1rem
}
textarea{min-height:120px}
.summary{text-align:left}
.summary div{margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #eee}
.heart{
position:fixed;font-size:20px;pointer-events:none;animation:fall 5s linear forwards;
}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
</style>
</head>
<body>

<div id="app"></div>

<script>
const questions=[
["Любимый цвет сейчас?","color"],
["Три слова, которыми ты бы описала себя","about"],
["Любимое время года","season"],
["Любимый цветок","flower"],
["Какой запах нравится больше всего?","smell"],
["Если бы ты была ароматом, каким?","aroma"],
["Твоя идеальная атмосфера?","atmosphere"],
["Любимый фильм","movie"],
["Любимая еда","food"],
["Любимый напиток","drink"],
["Наше самое тёплое воспоминание","memory"],
["Когда ты была самой счастливой со мной?","happy"],
["Куда бы ты хотела сходить со мной?","place"],
["Что я делаю такого, что тебе нравится?","like"],
["Какая мелочь напоминает тебе обо мне?","thing"],
["Какие цветы были бы в идеальном букете?","bouquet"],
["Какое настроение должен передавать идеальный аромат?","perfume"],
["Представь, что мы открыли эту анкету через много лет. Что бы ты хотела сказать нам сегодняшним?","future"]
];

const answers={};
const app=document.getElementById("app");

function daysTogether(){
 const start=new Date("2023-06-01");
 return Math.floor((new Date()-start)/(1000*60*60*24));
}

function startScreen(){
 app.innerHTML=`
 <section class="screen">
  <div class="card">
   <h1>❤️</h1>
   <h2>Три года вместе</h2>
   <p>
   Три года воспоминаний, смеха, приключений и моментов,
   которые стали для нас особенными.
   </p>
   <p style="margin-top:15px;font-weight:600;color:#ff5c8a">
   Вместе уже ${daysTogether()} дней ❤️
   </p>
   <button class="btn" onclick="intro()">Начать ❤️</button>
  </div>
 </section>`;
}

window.intro=function(){
 app.innerHTML=`
 <section class="screen">
  <div class="card">
   <h2>Спасибо тебе за эти 3 года ❤️</h2>
   <p>
   За все наши воспоминания, маленькие традиции,
   спонтанные решения, долгие разговоры и моменты,
   которые сделали нас нами.
   <br><br>
   Я понял, что самое ценное в наших отношениях — это тысячи
   маленьких деталей, из которых складывается наша история.
   <br><br>
   Поэтому я подготовил для тебя небольшую анкету.
   Она нужна для того, чтобы сохранить частичку нас такими,
   какие мы есть сегодня.
   </p>
   <button class="btn" onclick="showQuestion(0)">Продолжить ✨</button>
  </div>
 </section>`;
}

window.showQuestion=function(i){
 const percent=Math.round((i/questions.length)*100);
 const [q,key]=questions[i];
 app.innerHTML=`
 <section class="screen">
  <div class="card">
   <div class="progress"><div style="width:${percent}%"></div></div>
   <h2>Вопрос ${i+1} из ${questions.length}</h2>
   <p>${q}</p>
   <textarea id="answer">${answers[key]||""}</textarea>
   <button class="btn" onclick="nextQuestion(${i})">Далее →</button>
  </div>
 </section>`;
}

window.nextQuestion=function(i){
 const key=questions[i][1];
 answers[key]=document.getElementById("answer").value;
 if(i<questions.length-1) showQuestion(i+1);
 else summary();
}

function summary(){
 let html='<section class="screen"><div class="card"><h2>Твоя анкета ❤️</h2><div class="summary">';
 questions.forEach(([q,k])=>{
  html+=`<div><strong>${q}</strong><br>${answers[k]||''}</div>`;
 });
 html+=`</div>
 <button class="btn" onclick="submitAnswers()">Отправить ❤️</button>
 </div></section>`;
 app.innerHTML=html;
}

window.submitAnswers = async function() {

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbys-dOosDMSVVOetIx7FNNyDpx2rtp4M3xAJg7i8H19_hsCaGolLsQ5X1XmPNBBLpYu/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(answers)
      }
    );

    console.log("Ответ сервера:", await response.text());

  } catch (error) {

    console.error("Ошибка отправки:", error);

    alert(
      "Не удалось сохранить ответы. Проверь подключение к интернету."
    );

    return;
  }

  app.innerHTML = `
  <section class="screen">
    <div class="card">
      <h1>❤️</h1>
      <h2>Спасибо ❤️</h2>
      <p>
      Теперь эта маленькая история сохранена.
      <br><br>
      Когда-нибудь мы сможем вернуться к этим ответам
      и вспомнить этот день.
      <br><br>
      А пока... наша история продолжается ✨
      </p>
    </div>
  </section>`;

  setInterval(() => {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.top = "-30px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
  }, 300);
}


 app.innerHTML=`
 <section class="screen">
  <div class="card">
   <h1>❤️</h1>
   <h2>Спасибо ❤️</h2>
   <p>
   Теперь эта маленькая история сохранена.
   <br><br>
   Когда-нибудь мы сможем вернуться к этим ответам
   и вспомнить этот день.
   <br><br>
   А пока... наша история продолжается ✨
   </p>
  </div>
 </section>`;

 setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.top="-30px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
 },300);
}

startScreen();
</script>
</body>
</html>
